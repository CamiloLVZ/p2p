transfer-protocol=TCP
#transfer-protocol=UDP
server.port=8080
max-clients=10
session.timeout.minutes=30
mysql.url=jdbc:mysql://localhost:3306/cliente_servidor?createDatabaseIfNotExist=true&serverTimezone=UTC
mysql.user=root
mysql.password=Admin2025*
hibernate.hbm2ddl.auto=update
hibernate.show_sql=false
hibernate.format_sql=false
security.aes.key=LaboratorioAES16

# Distributed peer-to-peer config
server.id=servidor-a
# server.host: IP pública que este servidor anuncia a los demás peers.
# OBLIGATORIO en máquinas con VPN (Hamachi, ZeroTier) o múltiples NICs.
# Si se omite, se detecta automáticamente (puede ser incorrecta con VPN).
server.host=192.168.1.79
server.peers=servidor-b:192.168.1.95:8080
peer.reconnect.max-attempts=5
peer.reconnect.backoff-ms=30000
