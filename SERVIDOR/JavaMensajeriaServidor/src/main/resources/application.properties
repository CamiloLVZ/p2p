# Distributed peer-to-peer config
server.id=servidor-a
# server.host: IP pública que este servidor anuncia a los demás peers.
# OBLIGATORIO en máquinas con VPN (Hamachi, ZeroTier) o múltiples NICs.
# Si se omite, se detecta automáticamente (puede ser incorrecta con VPN).
server.host=26.20.206.11
#server.peers=servidor-b:26.111.70.213:8080
peer.reconnect.max-attempts=5
peer.reconnect.backoff-ms=30000

# ML proxy — servicio Python FastAPI de clasificacion de genero musical
ml.host=localhost
ml.port=8000
