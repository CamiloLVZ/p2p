<div class="view-root">
  <app-page-header
    titulo="Logs del Sistema"
    subtitulo="Registro de actividad técnica del servidor.">
    <button mat-stroked-button (click)="cargar()" [disabled]="!serverService.seleccionado$() || loading()">
      <mat-icon>refresh</mat-icon> Actualizar
    </button>
  </app-page-header>

  @if (loading()) { <mat-progress-bar mode="indeterminate" /> }
  @if (error()) { <div class="error-banner">{{ error() }}</div> }

  @if (datos().length > 0) {
    <table mat-table [dataSource]="datos()" class="mat-elevation-z1">
      <ng-container matColumnDef="nivel">
        <th mat-header-cell *matHeaderCellDef>Nivel</th>
        <td mat-cell *matCellDef="let r" [class]="nivelClass(r.nivel)">
          <span class="nivel-badge">{{ r.nivel }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="mensaje">
        <th mat-header-cell *matHeaderCellDef>Mensaje</th>
        <td mat-cell *matCellDef="let r" class="mensaje-cell">{{ r.mensaje }}</td>
      </ng-container>
      <ng-container matColumnDef="origen">
        <th mat-header-cell *matHeaderCellDef>Origen</th>
        <td mat-cell *matCellDef="let r">{{ r.origen }}</td>
      </ng-container>
      <ng-container matColumnDef="ipRemitente">
        <th mat-header-cell *matHeaderCellDef>IP</th>
        <td mat-cell *matCellDef="let r">{{ r.ipRemitente }}</td>
      </ng-container>
      <ng-container matColumnDef="fechaEvento">
        <th mat-header-cell *matHeaderCellDef>Fecha</th>
        <td mat-cell *matCellDef="let r">{{ r.fechaEvento | date:'dd/MM/yy HH:mm:ss' }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;" [class]="nivelClass(row.nivel)"></tr>
    </table>

    <mat-paginator
      [length]="total()"
      [pageSize]="tamanoPagina"
      [pageSizeOptions]="[20, 50, 100]"
      (page)="onPage($event)"
      showFirstLastButtons />
  } @else if (!loading()) {
    <app-empty-state mensaje="Sin logs disponibles" icono="list_alt" />
  }
</div>
